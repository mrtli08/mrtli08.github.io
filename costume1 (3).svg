<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="452.08395" height="149.38281" viewBox="0,0,452.08395,149.38281"><g transform="translate(-7.49709,-12.14927)"><g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" font-size="40" text-anchor="start" style="mix-blend-mode: normal"><text transform="translate(7.69443,29.01072) scale(0.39468,0.39468)" font-size="40" xml:space="preserve" fill="#000000" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">&lt;p&gt;INSERT TEXT&lt;/p&gt;: Writes text. (you can place multiple)</tspan><tspan x="0" dy="46.15px">&lt;br&gt;: Put inside text for a newline.</tspan><tspan x="0" dy="46.15px">&lt;img src="INSERT IMAGE URL"&gt;: Shows a image from a URL.</tspan><tspan x="0" dy="46.15px">&lt;a href="INSERT URL"&gt;INSERT TEXT TO SHOW&lt;/a&gt;: </tspan><tspan x="0" dy="46.15px">Shows a text that will send you to the website you wrote.</tspan><tspan x="0" dy="46.15px">&lt;h1&gt;INSERT TEXT HERE&lt;/h1&gt;: Displays big text, increase the</tspan><tspan x="0" dy="46.15px">number in the name (for both sides) to make it smaller </tspan><tspan x="0" dy="46.15px">(Up to 6, down to 1).</tspan></text></g></g></svg>